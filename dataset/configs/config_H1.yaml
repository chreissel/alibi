general:
    type: BBH
    seed: 42
    num_per_class: 64      # examples generated per class (signal/glitch/background)
    batch_size: 64
    waveform_duration: 1    # duration of the analysis window [s]
    sample_rate: 4096
    right_pad: 0.1          # coalescence point [s] from right edge of window
    f_min: 20
    f_max: 2048
    f_ref: 20
    ifos: ['H1']            # single strain detector for now
    run: O3a                # GWOSC observing run for background (see load_data.py)
    max_background_seconds: 4096   # cap on how much background to download

# --- CBC (BBH) signal prior -------------------------------------------------
waveform:
    chirp_mass:
        func: ml4gw.distributions.PowerLaw
        args: [10, 100, -2.35]
    mass_ratio:
        func: torch.distributions.Uniform
        args: [0.125, 0.999]
    chi1:
        func: torch.distributions.Uniform
        args: [-0.999, 0.999]
    chi2:
        func: torch.distributions.Uniform
        args: [-0.999, 0.999]
    distance:
        func: ml4gw.distributions.PowerLaw
        args: [100, 1000, 2]
    phic:
        func: ml4gw.distributions.DeltaFunction
        args: [0]
    inclination:
        func: ml4gw.distributions.Sine

# --- whitening --------------------------------------------------------------
whiten:
    fftlength: 2
    average: median
    overlap: null
    psd_length: 16
    fduration: 2

# --- signal SNR reweighting -------------------------------------------------
snr_reweighting:
    func: ml4gw.distributions.PowerLaw
    args: [12, 100, -3]

# --- glitch (SineGaussian) --------------------------------------------------
glitch:
    prior:
        quality:
            func: torch.distributions.Uniform
            args: [3.0, 30.0]
        frequency:
            func: torch.distributions.Uniform
            args: [30.0, 400.0]
        hrss:                       # amplitude placeholder; overwritten by SNR reweighting
            func: ml4gw.distributions.DeltaFunction
            args: [1.0]
        phase:
            func: torch.distributions.Uniform
            args: [0.0, 6.283185307]
        eccentricity:               # 0 -> pure plus polarisation (nonzero)
            func: ml4gw.distributions.DeltaFunction
            args: [0.0]
    snr:
        strain:                     # how loud the glitch is in the strain channel
            func: ml4gw.distributions.PowerLaw
            args: [12, 100, -3]
        witness:                    # how loud it is in the (well-measured) witness
            func: torch.distributions.Uniform
            args: [15.0, 50.0]

# --- witness channel --------------------------------------------------------
witness:
    noise:
        color: white                # 'white' or 'powerlaw' (with `index`)
    coupling:
        type: lti                   # LTI Butterworth coupling
        alpha: 1.0                  # fraction of strain-glitch power coherent w/ witness
        filter:
            btype: bandpass
            cutoff: [20, 400]
            order: 4
